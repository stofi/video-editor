<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0f0f0f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <title>Video Editor</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- Import screen -->
      <div id="import-screen" class="screen active">
        <div class="import-zone" id="import-zone">
          <div class="import-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M15 10l-4 4m0 0l-4-4m4 4V3M3 17v1a2 2 0 002 2h14a2 2 0 002-2v-1" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <p class="import-label">Tap to open a video</p>
          <p class="import-sub">MP4, MOV, WebM — stays in your browser</p>
          <input type="file" id="file-input" accept="video/*" />
        </div>
      </div>

      <!-- Editor screen -->
      <div id="editor-screen" class="screen">
        <!-- Preview -->
        <div id="preview-area">
          <video id="preview-video" playsinline muted></video>
          <div id="processing-overlay" hidden>
            <div class="spinner"></div>
            <p id="processing-label">Processing…</p>
            <div id="progress-bar-wrap">
              <div id="progress-bar"></div>
            </div>
          </div>
        </div>

        <!-- Playback controls -->
        <div id="playback-controls">
          <button id="btn-play" class="icon-btn" aria-label="Play/Pause">
            <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" hidden><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          <span id="time-display">0:00 / 0:00</span>
          <button id="btn-mute" class="icon-btn" aria-label="Mute">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
          </button>
        </div>

        <!-- Timeline -->
        <div id="timeline-wrap">
          <div id="timeline" class="timeline">
            <canvas id="waveform-canvas"></canvas>
            <div id="trim-region">
              <div id="trim-start" class="trim-handle" data-handle="start"></div>
              <div id="trim-end" class="trim-handle" data-handle="end"></div>
            </div>
            <div id="playhead"></div>
          </div>
        </div>

        <!-- Toolbar -->
        <div id="toolbar">
          <button class="tool-btn active" data-tool="trim">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
            <span>Trim</span>
          </button>
          <button class="tool-btn" data-tool="crop">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2v14h14M2 6h14"/></svg>
            <span>Crop</span>
          </button>
          <button class="tool-btn" data-tool="speed">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-linejoin="round"/></svg>
            <span>Speed</span>
          </button>
          <button class="tool-btn" data-tool="mute-audio">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 9v6h4l5 5V4L13 9H9z"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            <span>Mute</span>
          </button>
          <button class="tool-btn" data-tool="color">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
            <span>Color</span>
          </button>
          <button class="tool-btn" data-tool="rotate">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5V1L7 6l5 5V7a6 6 0 11-5.8 7.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>Rotate</span>
          </button>
          <button class="tool-btn" data-tool="overlay">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
            <span>Overlay</span>
          </button>
          <button id="btn-export" class="tool-btn export">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            <span>Export</span>
          </button>
        </div>

        <!-- Tool panels -->
        <div id="tool-panels">
          <div id="panel-overlay" class="tool-panel" hidden>
            <input type="file" id="overlay-input" accept="image/*" style="display:none" />
            <button class="preset-btn" onclick="document.getElementById('overlay-input').click()">Choose image</button>
            <label class="overlay-opacity-label">
              Opacity: <span id="overlay-opacity-value">100%</span>
            </label>
            <input type="range" id="overlay-opacity" min="0" max="100" value="100" />
            <button id="btn-overlay-remove" class="preset-btn danger" hidden>Remove</button>
          </div>
          <div id="panel-crop" class="tool-panel" hidden>
            <div class="preset-btns">
              <button class="preset-btn active" data-preset="free">Free</button>
              <button class="preset-btn" data-preset="16:9">16:9</button>
              <button class="preset-btn" data-preset="9:16">9:16</button>
              <button class="preset-btn" data-preset="1:1">1:1</button>
              <button class="preset-btn" data-preset="4:3">4:3</button>
            </div>
          </div>
          <div id="panel-color" class="tool-panel" hidden>
            <label>Brightness: <span id="color-brightness-value">0</span></label>
            <input type="range" id="color-brightness" min="-0.5" max="0.5" step="0.05" value="0" />
            <label>Contrast: <span id="color-contrast-value">1</span></label>
            <input type="range" id="color-contrast" min="0.5" max="2" step="0.05" value="1" />
            <label>Saturation: <span id="color-saturation-value">1</span></label>
            <input type="range" id="color-saturation" min="0" max="2" step="0.05" value="1" />
            <button id="btn-color-reset" class="preset-btn">Reset</button>
          </div>
          <div id="panel-rotate" class="tool-panel" hidden>
            <div class="preset-btns">
              <button id="btn-rotate-ccw" class="preset-btn">↺ CCW</button>
              <button id="btn-rotate-cw"  class="preset-btn">↻ CW</button>
              <button id="btn-flip-h"     class="preset-btn">⇆ Flip H</button>
              <button id="btn-flip-v"     class="preset-btn">⇅ Flip V</button>
              <button id="btn-rotate-reset" class="preset-btn">Reset</button>
            </div>
          </div>
          <div id="panel-speed" class="tool-panel" hidden>
            <label>Speed: <span id="speed-value">1×</span></label>
            <input type="range" id="speed-slider" min="0.25" max="4" step="0.25" value="1" />
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
